name: Validate Brewfiles
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "custom/brew/**"
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@24728b77430f9659b8d89068e4afe7f5fd0f973c # master

      - name: Validate Brewfiles
        shell: bash
        run: |
          echo "Validating Brewfiles in custom/brew/ directory..."

          find "custom/brew" -iname '*\.Brewfile*' -print0 | \
            while IFS= read -r -d '' brewfile ; do
              echo "::group:: ===$(basename "$brewfile")==="
              if ! formulae=$(brew bundle list --file="$brewfile" --brews); then
                echo "✗ $brewfile: failed to parse Brewfile"
                exit 1
              fi
              valid=1
              while IFS= read -r formula; do
                [ -z "$formula" ] && continue
                if brew info --json=v2 "$formula" >/dev/null 2>&1; then
                  echo "✓ $formula exists"
                else
                  echo "✗ $formula: not a valid formula"
                  valid=0
                fi
              done <<< "$formulae"
              if [ "$valid" -eq 1 ]; then
                echo "✓ $brewfile is valid"
              else
                echo "✗ $brewfile validation failed"
                exit 1
              fi
              echo "::endgroup::"
            done
